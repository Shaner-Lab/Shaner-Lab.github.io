<script>
  // Auto-resize FRET calculator iframe to avoid internal scrollbars
  document.addEventListener('DOMContentLoaded', function () {
    var iframe = document.getElementById('fret-calculator-iframe');
    if (!iframe) return;

    function resizeIframe() {
      try {
        var doc = iframe.contentDocument || (iframe.contentWindow && iframe.contentWindow.document);
        if (!doc) return;
        var body = doc.body;
        var html = doc.documentElement;
        if (!body || !html) return;

        var height = Math.max(
          body.scrollHeight || 0,
          body.offsetHeight || 0,
          html.clientHeight || 0,
          html.scrollHeight || 0,
          html.offsetHeight || 0
        );

        if (height && !isNaN(height)) {
          iframe.style.height = height + 'px';
        }
      } catch (e) {
        // If cross-origin ever changes, fail silently
      }
    }

    iframe.addEventListener('load', function () {
      resizeIframe();
      // Re-check after app hydration/layout adjustments
      setTimeout(resizeIframe, 500);
      setTimeout(resizeIframe, 1500);
    });

    // Adjust on window resize
    window.addEventListener('resize', function () {
      resizeIframe();
    });

    // Periodic safety check for dynamic content changes
    setInterval(resizeIframe, 2000);
  });
</script>
