    <section class="elementor-section elementor-top-section elementor-element elementor-element-4721917 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-id="4721917" data-element_type="section" style="padding-top:40px;padding-bottom:40px;">
      <div class="elementor-container elementor-column-gap-default">
        <div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-98fcec4" data-id="98fcec4" data-element_type="column">
          <div class="elementor-widget-wrap elementor-element-populated">
            <div class="elementor-element elementor-element-7f7de14 elementor-widget elementor-widget-html" data-id="7f7de14" data-element_type="widget" data-widget_type="html.default">
              <div class="elementor-widget-container">
                <style>
                  /* Center protein table headings except Name and Publication */
                  #proteinTable thead th {
                    text-align: center;
                  }
                  #proteinTable thead th:first-child,
                  #proteinTable thead th:last-child {
                    text-align: center;
                  }

                  /* Center protein table data cells except Name and Publication */
                  #proteinTable tbody td {
                    text-align: center;
                  }

                  /* Left-align first column data, right-align last column data */
                  #proteinTable tbody td:first-child {
                    text-align: left;
                  }
                  #proteinTable tbody td:last-child {
                    text-align: right;
                  }

                  /* Bold and adjust table headers */
                  #proteinTable thead th {
                    font-weight: bold;
                    font-size: 1em;
                    white-space: normal;
                    padding: 0.25rem 0.5rem;
                  }

                  /* Style for the table title */
                  .table-title {
                    font-weight: bold !important;
                    color: #fff !important;
                    margin: 0 0 12px 0;
                  }

                  /* Reset padding for Name and Publication columns */
                  #proteinTable thead th:first-child,
                  #proteinTable thead th:last-child {
                    padding: 0.3rem !important;
                  }

                  /* Make table headers clickable for sorting */
                  #proteinTable thead th {
                    cursor: pointer;
                    user-select: none;
                  }
                  #proteinTable thead th .sort-indicator {
                    display: inline-block;
                    margin-left: 6px;
                    opacity: 0.7;
                    font-size: 0.85em;
                  }
                </style>

                <div class="elementor-widget-container">
                  <h2 class="table-title">
                    Fluorescent Proteins from the Shaner Lab on
                    <a href="https://www.fpbase.org" target="_blank" rel="noopener noreferrer">FPbase.org</a>
                  </h2>
                  <table class="table table-sm table-striped" id="proteinTable" style="width:100%; text-align:center;">
                    <thead>
                      <tr class="table-header">
                        <th class="protein">Name</th>
                        <th>λ<sub>ex</sub></th>
                        <th>λ<sub>em</sub></th>
                        <th><span class="d-none d-md-inline">Stokes</span><span class="d-block d-md-none">λ<sub>Δ</sub></span></th>
                        <th>EC</th>
                        <th>QY</th>
                        <th>Bright<span class="d-none d-lg-inline">ness</span></th>
                        <th>pKa</th>
                        <th class="agg_type">Agg<span class="d-none d-xl-inline">regation</span></th>
                        <th><span class="d-none d-xl-inline">Lifetime</span><span class="d-block d-xl-none">τ</span></th>
                        <th>Publication</th>
                      </tr>
                    </thead>
                    <tbody></tbody>
                  </table>
                </div>

                <script>
                  document.addEventListener('DOMContentLoaded', function () {
                    const table = document.getElementById('proteinTable');
                    if (!table) return;
                    const tableBody = table.querySelector('tbody');
                    if (!tableBody) return;

                    tableBody.innerHTML = '';

                    const sortState = {
                      colIdx: 0,
                      dir: 1 // 1 = asc, -1 = desc
                    };

                    function getCellValue(row, idx) {
                      const cell = row.children[idx];
                      if (!cell) return '';
                      return (cell.textContent || '').trim();
                    }

                    function parseMaybeNumber(value) {
                      const v = value.replace(/,/g, '');
                      const n = Number(v);
                      return Number.isFinite(n) ? n : null;
                    }

                    // Columns: 0 name (text), 1-7 numeric-ish, 8 agg (text), 9 lifetime (numeric-ish), 10 publication (text)
                    function compareRows(a, b, idx) {
                      const av = getCellValue(a, idx);
                      const bv = getCellValue(b, idx);

                      const numericCols = new Set([1, 2, 3, 4, 5, 6, 7, 9]);
                      if (numericCols.has(idx)) {
                        const an = parseMaybeNumber(av);
                        const bn = parseMaybeNumber(bv);
                        // Push blanks/NaN to bottom regardless of sort direction
                        if (an == null && bn == null) return 0;
                        if (an == null) return 1;
                        if (bn == null) return -1;
                        return an - bn;
                      }

                      return av.localeCompare(bv, undefined, { numeric: true, sensitivity: 'base' });
                    }

                    function updateHeaderIndicators() {
                      const ths = Array.from(table.querySelectorAll('thead th'));
                      ths.forEach((th, idx) => {
                        let span = th.querySelector('.sort-indicator');
                        if (!span) {
                          span = document.createElement('span');
                          span.className = 'sort-indicator';
                          th.appendChild(span);
                        }
                        if (idx === sortState.colIdx) {
                          span.textContent = sortState.dir === 1 ? '▲' : '▼';
                        } else {
                          span.textContent = '';
                        }
                      });
                    }

                    function sortTable() {
                      const rows = Array.from(tableBody.querySelectorAll('tr'));
                      rows.sort((a, b) => sortState.dir * compareRows(a, b, sortState.colIdx));
                      rows.forEach((r) => tableBody.appendChild(r));
                      updateHeaderIndicators();
                    }

                    function attachSorting() {
                      const ths = Array.from(table.querySelectorAll('thead th'));
                      ths.forEach((th, idx) => {
                        th.addEventListener('click', () => {
                          if (sortState.colIdx === idx) {
                            sortState.dir *= -1;
                          } else {
                            sortState.colIdx = idx;
                            sortState.dir = 1;
                          }
                          sortTable();
                        });
                      });
                      updateHeaderIndicators();
                    }

                    attachSorting();

                    fetch('proteins.json')
                      .then((response) => response.json())
                      .then((data) => {
                        data.forEach((protein) => {
                          const state = (protein.states && protein.states.length) ? protein.states[0] : {};
                          if (state.ext_coeff == null) return;

                          const row = document.createElement('tr');
                          row.classList.add('data');

                          const stokes =
                            (state.ex_max != null && state.em_max != null) ? (state.em_max - state.ex_max) : '-';

                          function wavelengthBg(wl) {
                            if (wl == null) return '';
                            if (wl < 400) {
                              const clamped = Math.max(wl, 300);
                              const hue = 290 - (clamped - 300) * 0.2;
                              return 'hsl(' + hue + ',100%,50%)';
                            }
                            if (wl <= 600) {
                              const hue = (600 - wl) * 270 / 200;
                              return 'hsl(' + hue + ',100%,50%)';
                            }
                            if (wl <= 700) {
                              const light = 50 * (1 - (wl - 600) / 100);
                              return 'hsl(0,100%,' + light + '%)';
                            }
                            return 'hsl(0,100%,0%)';
                          }

                          function wavelengthTextColor(wl) {
                            return wl != null && wl > 575 ? 'white' : 'black';
                          }

                          function td(text, opts) {
                            const cell = document.createElement('td');
                            if (opts && opts.html) {
                              cell.innerHTML = text;
                            } else {
                              cell.textContent = text;
                            }
                            if (opts && opts.style) {
                              Object.assign(cell.style, opts.style);
                            }
                            if (opts && opts.className) cell.className = opts.className;
                            return cell;
                          }

                          const name = protein.name || '-';
                          const ex = state.ex_max != null ? String(state.ex_max) : '-';
                          const em = state.em_max != null ? String(state.em_max) : '-';
                          const ec = state.ext_coeff != null ? String(state.ext_coeff) : '-';
                          const qy = state.qy != null ? String(state.qy) : '-';
                          const br = (state.brightness != null) ? String(state.brightness) : '-';
                          const pka = state.pka != null ? String(state.pka) : '-';
                          const agg = state.aggregation || '-';
                          const tau = (state.lifetime != null) ? String(state.lifetime) : '-';

                          // Publication: prefer primary reference
                          let pubHtml = '-';
                          if (protein.primary_reference && protein.primary_reference.doi) {
                            const doi = protein.primary_reference.doi;
                            pubHtml = '<a href="https://doi.org/' + doi + '" target="_blank" rel="noopener noreferrer">' + doi + '</a>';
                          } else if (protein.primary_reference && protein.primary_reference.url) {
                            pubHtml = '<a href="' + protein.primary_reference.url + '" target="_blank" rel="noopener noreferrer">Link</a>';
                          }

                          row.appendChild(td(name));
                          row.appendChild(
                            td(ex, {
                              style: {
                                background: wavelengthBg(state.ex_max),
                                color: wavelengthTextColor(state.ex_max)
                              }
                            })
                          );
                          row.appendChild(
                            td(em, {
                              style: {
                                background: wavelengthBg(state.em_max),
                                color: wavelengthTextColor(state.em_max)
                              }
                            })
                          );
                          row.appendChild(td(stokes === '-' ? '-' : String(stokes)));
                          row.appendChild(td(ec));
                          row.appendChild(td(qy));
                          row.appendChild(td(br));
                          row.appendChild(td(pka));
                          row.appendChild(td(String(agg)));
                          row.appendChild(td(tau));
                          row.appendChild(td(pubHtml, { html: true }));

                          tableBody.appendChild(row);
                        });

                        // Default sort by Name ascending after load
                        sortState.colIdx = 0;
                        sortState.dir = 1;
                        sortTable();
                      })
                      .catch(() => {
                        // fail silently
                      });
                  });
                </script>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
